name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pacefinder
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          # Upload <archive>.sha256 alongside each binary archive.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Write the install instructions into the release body after all platform
  # builds have uploaded their archives. Single source of truth lives in
  # .github/install-snippet.md (also embedded in README.md).
  release-notes:
    name: Update release notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render install snippet with tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Strip the HTML comment header (lines between <!-- ... --> at top of file)
          # and substitute ${TAG} placeholders, then write to a notes file.
          awk 'NR==1 && /^<!--/ {skip=1} skip && /-->/ {skip=0; next} !skip' \
            .github/install-snippet.md \
            | envsubst '${TAG}' > release-notes.md
          echo "--- rendered release notes ---"
          cat release-notes.md
      - name: Set release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --notes-file release-notes.md --repo "$GITHUB_REPOSITORY"
