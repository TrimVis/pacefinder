name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Cargo.toml version from tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          python - "$VERSION" <<'PY'
          import re, pathlib, sys
          version = sys.argv[1]
          path = pathlib.Path("Cargo.toml")
          text = path.read_text()
          new = re.sub(r'^version = ".*"', f'version = "{version}"', text, count=1, flags=re.M)
          if new == text:
              raise SystemExit("Cargo.toml version line not found")
          path.write_text(new)
          PY
          grep -m1 '^version' Cargo.toml
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pacefinder
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          # Upload <archive>.sha256 alongside each binary archive.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Write the install instructions into the release body after all platform
  # builds have uploaded their archives. Lives in .github/install-snippet.md;
  # README just links to the releases page rather than duplicating it.
  release-notes:
    name: Update release notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render install snippet with tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Strip the HTML comment header (lines between <!-- ... --> at top of file)
          # and substitute ${TAG} placeholders, then write to a notes file.
          awk 'NR==1 && /^<!--/ {skip=1} skip && /-->/ {skip=0; next} !skip' \
            .github/install-snippet.md \
            | envsubst '${TAG}' > release-notes.md
          echo "--- rendered release notes ---"
          cat release-notes.md
      - name: Set release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --notes-file release-notes.md --repo "$GITHUB_REPOSITORY"
